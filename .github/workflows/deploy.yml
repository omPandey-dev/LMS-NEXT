name: Deploy Frontend

on:
  push:
    branches:
      - DEVELOPMENT

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/LMS-NEXT
            ./deploy.sh
